name: gaamride
description: Village Transport & Logistics Platform
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  firebase_messaging: ^15.0.0
  firebase_storage: ^12.1.0

  google_maps_flutter: ^2.6.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^12.0.0
  geoflutterfire_plus: ^0.0.14
  permission_handler: ^11.3.0

  google_sign_in: ^6.2.0

  url_launcher: ^6.3.0
  cached_network_image: ^3.3.0
  image_picker: ^1.1.0
  flutter_local_notifications: ^17.1.0
  intl: ^0.19.0
  shared_preferences: ^2.3.0
  http: ^1.2.0
  flutter_spinkit: ^5.2.0
  confetti: ^0.7.0
  shimmer: ^3.0.0
  vibration: ^2.0.0
  animated_text_kit: ^4.2.2
  lottie: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
